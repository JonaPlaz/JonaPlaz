<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-label="Jonathan Plazanet — Développeur Agentique, Backend Symfony / PHP. Méthode : implémentation avec Claude Code, revue avec Codex. Contact : jgplazanet@gmail.com. Disponible.">
  <defs>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .cmd  { fill: #8b949e; }              /* commandes tapées — gris */
      .sym  { fill: #56d4dd; font-weight: 700; } /* invite $ / > — cyan lumineux */
      .name { fill: #ffffff; font-weight: 700; } /* nom — blanc vif */
      .role { fill: #79c0ff; }              /* rôle — bleu clair */
      .tool { fill: #e3b341; }              /* outils — ambre */
      .mail { fill: #58a6ff; }              /* email — bleu */
      .ok   { fill: #3fb950; font-weight: 700; } /* disponible — vert vif */
    </style>
  </defs>

  <!-- fond -->
  <rect width="1200" height="440" fill="#0d1117"/>

  <!-- fenêtre terminal -->
  <rect x="40" y="28" width="1120" height="384" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- barre de titre -->
  <path d="M40 42 a14 14 0 0 1 14 -14 h1092 a14 14 0 0 1 14 14 v22 h-1120 z" fill="#21262d"/>
  <circle cx="66"  cy="53" r="6.5" fill="#ff5f56"/>
  <circle cx="88"  cy="53" r="6.5" fill="#ffbd2e"/>
  <circle cx="110" cy="53" r="6.5" fill="#27c93f"/>
  <text x="600" y="58" text-anchor="middle" class="mono" font-size="15" fill="#6e7681">jona@dev</text>

  <!-- contenu -->
  <g class="mono" font-size="21">
    <text x="76" y="112"><tspan class="sym">$</tspan><tspan class="cmd" dx="14">whoami</tspan></text>
    <text x="76" y="145"><tspan class="sym">&gt;</tspan><tspan class="name" dx="14" font-size="27">Jonathan Plazanet</tspan></text>

    <text x="76" y="188"><tspan class="sym">$</tspan><tspan class="cmd" dx="14">role</tspan></text>
    <text x="76" y="221"><tspan class="sym">&gt;</tspan><tspan class="role" dx="14">Développeur Agentique · Backend Symfony / PHP</tspan></text>

    <text x="76" y="264"><tspan class="sym">$</tspan><tspan class="cmd" dx="14">methode</tspan></text>
    <text x="76" y="297"><tspan class="sym">&gt;</tspan><tspan class="tool" dx="14">implémentation : Claude Code · revue : Codex</tspan></text>

    <text x="76" y="340"><tspan class="sym">$</tspan><tspan class="cmd" dx="14">contact --email</tspan></text>
    <text x="76" y="373"><tspan class="sym">&gt;</tspan><tspan class="mail" dx="14">jgplazanet@gmail.com</tspan></text>
  </g>

  <!-- statut, colonne droite -->
  <g class="mono" font-size="21">
    <text x="720" y="112"><tspan class="sym">$</tspan><tspan class="cmd" dx="14">status</tspan></text>
    <text x="720" y="145"><tspan class="sym">&gt;</tspan><tspan class="ok" dx="14">● disponible</tspan></text>
    <text x="720" y="188"><tspan class="sym">$</tspan><tspan class="cmd" dx="14">zone</tspan></text>
    <text x="720" y="221"><tspan class="role" dx="14">full remote · Paris hybride</tspan></text>

    <text x="720" y="373"><tspan class="sym">$</tspan></text>
  </g>

  <!-- curseur clignotant -->
  <rect x="746" y="357" width="12" height="22" fill="#3fb950">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
